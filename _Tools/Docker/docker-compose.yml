services:
  postgres:
    image: postgres:16
    container_name: opendelivery-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opendelivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../_Project
      dockerfile: ../_Tools/Docker/backend.Dockerfile
    container_name: opendelivery-backend
    environment:
      - JDBC_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
